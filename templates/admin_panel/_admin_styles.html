<!-- Shared admin component styles for pages that extend base.html instead of admin_panel/base.html -->
<style>
    /* PNP Color Palette & UI Variables */
    :root {
        --pnp-blue: #003087;
        --pnp-blue-light: #0047AB;
        --pnp-blue-dark: #00206B;
        --pnp-red: #DC143C;
        --pnp-gold: #FFD700;
        --primary: #003087;
        --primary-light: #E3F2FD;
        --secondary: #6C757D;
        --success: #10B981;
        --danger: #EF4444;
        --warning: #F59E0B;
        --info: #3B82F6;
        --white: #FFFFFF;
        --gray-50: #F9FAFB;
        --gray-100: #F3F4F6;
        --gray-200: #E5E7EB;
        --gray-300: #D1D5DB;
        --gray-400: #9CA3AF;
        --gray-500: #6B7280;
        --gray-600: #4B5563;
        --gray-700: #374151;
        --gray-800: #1F2937;
        --gray-900: #111827;
        --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --space-1: 0.25rem;
        --space-2: 0.5rem;
        --space-3: 0.75rem;
        --space-4: 1rem;
        --space-5: 1.25rem;
        --space-6: 1.5rem;
        --space-8: 2rem;
        --space-10: 2.5rem;
        --space-12: 3rem;
        --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
        --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Page Header */
    .admin-page-header {
        background: var(--white);
        padding: var(--space-6) var(--space-8);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xs);
        margin-bottom: var(--space-8);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: var(--space-4);
        border: 1px solid var(--gray-100);
    }
    .admin-page-title {
        margin: 0;
        font-size: 1.875rem;
        font-weight: 700;
        color: var(--pnp-blue);
        display: flex;
        align-items: center;
        gap: var(--space-3);
    }
    .admin-page-title i { font-size: 1.5rem; }
    .admin-breadcrumb {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        font-size: 0.875rem;
        color: var(--gray-500);
        margin-top: var(--space-2);
    }
    .admin-breadcrumb a {
        color: var(--pnp-blue);
        text-decoration: none;
        transition: color var(--transition-fast);
    }
    .admin-breadcrumb a:hover { color: var(--pnp-blue-light); }

    /* Buttons */
    .btn {
        display: inline-flex;
        align-items: center;
        gap: var(--space-2);
        padding: var(--space-3) var(--space-5);
        border: none;
        border-radius: var(--radius-md);
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all var(--transition-fast);
        text-decoration: none;
        white-space: nowrap;
    }
    .btn-primary { background: var(--pnp-blue); color: var(--white); }
    .btn-primary:hover { background: var(--pnp-blue-light); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-success { background: var(--success); color: var(--white); }
    .btn-success:hover { background: #059669; transform: translateY(-1px); }
    .btn-danger { background: var(--danger); color: var(--white); }
    .btn-danger:hover { background: #DC2626; transform: translateY(-1px); }
    .btn-secondary { background: var(--secondary); color: var(--white); }
    .btn-secondary:hover { background: var(--gray-600); }
    .btn-outline { background: var(--white); color: var(--pnp-blue); border: 2px solid var(--pnp-blue); }
    .btn-outline:hover { background: var(--pnp-blue); color: var(--white); }
    .btn-sm { padding: var(--space-2) var(--space-3); font-size: 0.8125rem; }
    .btn-warning { background: var(--warning); color: var(--white); }
    .btn-warning:hover { background: #D97706; transform: translateY(-1px); }
    .btn i { font-size: 1rem; }

    /* Cards */
    .admin-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xs);
        padding: var(--space-6);
        margin-bottom: var(--space-6);
        border: 1px solid var(--gray-100);
    }
    .admin-card-header {
        margin-bottom: var(--space-6);
        padding-bottom: var(--space-4);
        border-bottom: 1px solid var(--gray-200);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .admin-card-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--gray-900);
        margin: 0;
        display: flex;
        align-items: center;
        gap: var(--space-3);
    }
    .admin-card-title i { color: var(--pnp-blue); }

    /* Tables */
    .admin-table-container {
        overflow-x: auto;
        background: var(--white);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xs);
        border: 1px solid var(--gray-100);
    }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table thead { background: var(--gray-50); }
    .admin-table th {
        padding: var(--space-4);
        text-align: left;
        font-weight: 700;
        color: var(--gray-700);
        border-bottom: 2px solid var(--gray-200);
        font-size: 0.8125rem;
        text-transform: uppercase;
        letter-spacing: 0.3px;
    }
    .admin-table td {
        padding: var(--space-4);
        border-bottom: 1px solid var(--gray-100);
        color: var(--gray-700);
        font-size: 0.875rem;
    }
    .admin-table tbody tr { transition: background var(--transition-fast); }
    .admin-table tbody tr:hover { background: var(--gray-50); }
    .admin-table tbody tr:last-child td { border-bottom: none; }

    /* Badges */
    .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        padding: var(--space-1) var(--space-3);
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        white-space: nowrap;
    }
    .badge-success { background: #D1FAE5; color: #065F46; border: 1px solid #6EE7B7; }
    .badge-danger { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
    .badge-warning { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
    .badge-info { background: #DBEAFE; color: #1E40AF; border: 1px solid #93C5FD; }
    .badge-secondary { background: var(--gray-200); color: var(--gray-700); border: 1px solid var(--gray-300); }
    .badge-primary { background: #DBEAFE; color: #1E3A8A; border: 1px solid #93C5FD; }
    .badge-superadmin { background: #EDE9FE; color: #5B21B6; border: 1px solid #C4B5FD; }
    .badge-teal { background: #CCFBF1; color: #0F766E; border: 1px solid #5EEAD4; }
    .badge-bluegray { background: #E0E7FF; color: #3730A3; border: 1px solid #A5B4FC; }

    /* Alerts */
    .alert {
        padding: var(--space-4) var(--space-5);
        border-radius: var(--radius-md);
        margin-bottom: var(--space-6);
        display: flex;
        align-items: center;
        gap: var(--space-3);
        border: 1px solid;
    }
    .alert-success { background: #D1FAE5; color: #065F46; border-color: #6EE7B7; }
    .alert-danger { background: #FEE2E2; color: #991B1B; border-color: #FCA5A5; }
    .alert-warning { background: #FEF3C7; color: #92400E; border-color: #FCD34D; }
    .alert-info { background: #DBEAFE; color: #1E40AF; border-color: #93C5FD; }
    .alert i { font-size: 1.125rem; }

    /* Forms */
    .form-group { margin-bottom: var(--space-5); }
    .form-label {
        display: block;
        margin-bottom: var(--space-2);
        font-weight: 600;
        color: var(--gray-700);
        font-size: 0.875rem;
    }
    .form-control {
        width: 100%;
        padding: var(--space-3) var(--space-4);
        border: 2px solid var(--gray-200);
        border-radius: var(--radius-md);
        font-size: 0.875rem;
        transition: all var(--transition-fast);
        background: var(--white);
        color: var(--gray-900);
    }
    .form-control:focus {
        outline: none;
        border-color: var(--pnp-blue);
        box-shadow: 0 0 0 3px rgba(0, 48, 135, 0.1);
    }
    .form-control:disabled { background: var(--gray-100); cursor: not-allowed; }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 100px; }

    /* Pagination */
    .pagination {
        display: flex;
        align-items: center;
        gap: var(--space-2);
        justify-content: center;
        margin-top: var(--space-8);
    }
    .pagination a, .pagination span {
        padding: var(--space-2) var(--space-3);
        border: 1px solid var(--gray-200);
        border-radius: var(--radius-sm);
        text-decoration: none;
        color: var(--gray-700);
        transition: all var(--transition-fast);
        font-size: 0.875rem;
        min-width: 38px;
        text-align: center;
    }
    .pagination a:hover { background: var(--pnp-blue); color: var(--white); border-color: var(--pnp-blue); }
    .pagination .current { background: var(--pnp-blue); color: var(--white); border-color: var(--pnp-blue); font-weight: 600; }

    /* Modals */
    .modal {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        max-width: none !important;
        margin: 0 !important;
        background: rgba(0, 0, 0, 0.6);
        z-index: 10015;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity var(--transition-base);
    }
    .modal.active { display: flex; opacity: 1; }
    .modal-content {
        background: var(--white);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        max-width: 450px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        transform: scale(0.9);
        transition: transform var(--transition-base);
    }
    .modal.active .modal-content { transform: scale(1); }
    .modal-header {
        padding: var(--space-6);
        border-bottom: 1px solid var(--gray-200);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .modal-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--gray-900);
        margin: 0;
        display: flex;
        align-items: center;
        gap: var(--space-3);
    }
    .modal-title i { color: var(--pnp-blue); }
    .modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        color: var(--gray-400);
        cursor: pointer;
        transition: color var(--transition-fast);
        padding: var(--space-2);
        line-height: 1;
    }
    .modal-close:hover { color: var(--gray-700); }
    .modal-body { padding: var(--space-6); }
    .modal-footer {
        padding: var(--space-6);
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: var(--space-3);
        justify-content: flex-end;
    }

    /* Dark theme support */
    [data-theme="dark"] .admin-page-header,
    [data-theme="dark"] .admin-card {
        background: #1A2332;
        border-color: #2D3A4F;
        color: #E2E8F0;
    }
    [data-theme="dark"] .admin-page-title { color: #60A5FA; }
    [data-theme="dark"] .admin-breadcrumb { color: #94A3B8; }
    [data-theme="dark"] .admin-breadcrumb a { color: #60A5FA; }
    [data-theme="dark"] .admin-card-title { color: #E2E8F0; }
    [data-theme="dark"] .admin-table-container { background: #1A2332; border-color: #2D3A4F; }
    [data-theme="dark"] .admin-table thead { background: #0F172A; }
    [data-theme="dark"] .admin-table th { color: #94A3B8; border-bottom-color: #2D3A4F; }
    [data-theme="dark"] .admin-table td { color: #CBD5E1; border-bottom-color: #2D3A4F; }
    [data-theme="dark"] .admin-table tbody tr:hover { background: #1E293B; }
    [data-theme="dark"] .form-label { color: #CBD5E1; }
    [data-theme="dark"] .form-control {
        background: #1A2332;
        border-color: #2D3A4F;
        color: #E2E8F0;
    }
    [data-theme="dark"] .form-control:focus { border-color: #60A5FA; box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15); }
    [data-theme="dark"] .form-control:disabled { background: #0F172A; }
    [data-theme="dark"] .modal-content { background: #1A2332; }
    [data-theme="dark"] .modal-header { border-bottom-color: #2D3A4F; }
    [data-theme="dark"] .modal-title { color: #E2E8F0; }
    [data-theme="dark"] .modal-close { color: #94A3B8; }
    [data-theme="dark"] .modal-footer { border-top-color: #2D3A4F; }
    [data-theme="dark"] .pagination a,
    [data-theme="dark"] .pagination span { border-color: #2D3A4F; color: #CBD5E1; }
    [data-theme="dark"] .pagination a:hover { background: #2563EB; border-color: #2563EB; color: #fff; }
    [data-theme="dark"] .pagination .current { background: #2563EB; border-color: #2563EB; color: #fff; }

    /* Inside content-card: remove redundant card chrome from inner components */
    .content-card .admin-page-header {
        box-shadow: none;
        border: none;
        padding: var(--space-4) 0;
        margin-bottom: var(--space-4);
        border-bottom: 1px solid var(--gray-200);
        border-radius: 0;
    }
    .content-card .admin-card {
        box-shadow: none;
        border: 1px solid var(--gray-100);
        padding: var(--space-4);
        margin-bottom: var(--space-4);
    }
    .content-card .admin-table-container {
        box-shadow: none;
        border: 1px solid var(--gray-100);
    }

    [data-theme="dark"] .content-card .admin-page-header {
        border-bottom-color: #2D3A4F;
    }
    [data-theme="dark"] .content-card .admin-card,
    [data-theme="dark"] .content-card .admin-table-container {
        background: transparent;
        border-color: #2D3A4F;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .admin-page-header {
            padding: var(--space-4);
            flex-direction: column;
            align-items: flex-start;
        }
        .admin-page-title { font-size: 1.25rem; }
    }
</style>
