<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGNES</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #003087 0%, #001F3F 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.15);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            border: 2px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 0.95rem;
            opacity: 0.8;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        .retry-btn {
            display: none;
            margin-top: 1.5rem;
            padding: 0.85rem 2rem;
            background: #DC143C;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .retry-btn:active {
            background: #B22222;
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div class="logo">A</div>
    <h1>AGNES</h1>
    <p>AI-Based Hotspot Detection &amp; Reporting System</p>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Connecting to server...</div>
    <button class="retry-btn" id="retryBtn" onclick="tryConnect()">Retry Connection</button>

    <script>
        // The server URL is configured in capacitor.config.ts
        // This page only shows when the server is unreachable
        var attempts = 0;
        var maxAttempts = 5;

        function tryConnect() {
            attempts++;
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('status').textContent = 'Connecting to server... (attempt ' + attempts + ')';

            // Try to reach the server
            fetch(window.location.origin + '/accounts/login/', { mode: 'no-cors', cache: 'no-cache' })
                .then(function() {
                    window.location.reload();
                })
                .catch(function() {
                    if (attempts >= maxAttempts) {
                        document.getElementById('spinner').style.display = 'none';
                        document.getElementById('status').textContent = 'Cannot reach server. Please check your internet connection.';
                        document.getElementById('retryBtn').style.display = 'inline-block';
                    } else {
                        setTimeout(tryConnect, 2000);
                    }
                });
        }

        // Auto-retry on load
        setTimeout(tryConnect, 1500);
    </script>
</body>
</html>
